name: 'SkillLedger Verify'
description: 'Verify a skill artifact against transparency log and policy'
inputs:
  artifact-path:
    description: 'Path to the artifact to verify'
    required: true
  service-url:
    description: 'SkillLedger transparency log service URL'
    required: false
    default: 'https://api.skillledger.in'
  policy-preset:
    description: 'Policy preset to apply (strict, moderate, permissive)'
    required: false
    default: 'moderate'
  skip-tlog:
    description: 'Skip transparency log check (for offline/local testing)'
    required: false
    default: 'false'
outputs:
  status:
    description: 'Verification result (pass or fail)'
    value: ${{ steps.verify.outputs.status }}
runs:
  using: 'composite'
  steps:
    - name: Verify artifact
      id: verify
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.artifact-path }}
        POLICY_PRESET: ${{ inputs.policy-preset }}
        SERVICE_URL: ${{ inputs.service-url }}
        SKIP_TLOG: ${{ inputs.skip-tlog }}
      run: |
        set -euo pipefail
        ARTIFACT="$ARTIFACT_PATH"
        if [ ! -f "$ARTIFACT" ]; then
          echo "::error::Artifact not found at $ARTIFACT"
          exit 1
        fi

        ARGS=(verify --artifact "$ARTIFACT" --preset "$POLICY_PRESET" --service-url "$SERVICE_URL")
        if [ "$SKIP_TLOG" = "true" ]; then
          ARGS+=(--skip-tlog)
        fi

        if skillledger "${ARGS[@]}"; then
          echo "status=pass" >> "$GITHUB_OUTPUT"
          echo "::notice::Verification PASSED for $ARTIFACT"
        else
          echo "status=fail" >> "$GITHUB_OUTPUT"
          echo "::error::Verification FAILED for $ARTIFACT"
          exit 1
        fi
