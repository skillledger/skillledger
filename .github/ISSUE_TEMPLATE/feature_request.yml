name: Feature Request
description: Propose a new feature, capability, or enhancement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose a feature. Please describe
        the **problem** you are trying to solve before describing the
        **solution** you would like.

        For larger architectural changes, please start a
        [Discussion](https://github.com/skillledger/skillledger/discussions)
        first so we can align on scope.

  - type: checkboxes
    id: prechecks
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched [existing issues](https://github.com/skillledger/skillledger/issues?q=is%3Aissue) and could not find a duplicate.
          required: true
        - label: I have considered whether this is in scope per the [project goals](../blob/main/README.md#what-is-skillledger).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What problem are you trying to solve? Describe the pain point in
        terms of user experience or use case. Avoid jumping to a solution.
      placeholder: |
        When I try to verify skills from a private registry, SkillLedger
        does not support custom transparency log endpoints with self-signed
        TLS certificates, so my internal CI cannot run verification.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: |
        How would you like SkillLedger to solve the problem? Include CLI
        flag names, config keys, or API endpoints if you have them in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What workarounds or alternative approaches have you tried? Why are
        they insufficient?

  - type: dropdown
    id: component
    attributes:
      label: Component most affected
      options:
        - "cli"
        - "service (FastAPI / transparency log)"
        - "service ee (org / SSO / billing)"
        - "dashboard"
        - "hooks"
        - "deployment / packaging"
        - "schemas / spec"
        - "threat library"
        - "docs"
        - "new ecosystem adapter"
    validations:
      required: true

  - type: dropdown
    id: willingness
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes - I can open a PR"
        - "Maybe - with guidance"
        - "No - I am proposing only"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, prior art in other tools, screenshots, anything else relevant.
