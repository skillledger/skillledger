repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'cd cli && golangci-lint run'
        language: system
        pass_filenames: false
        files: '\.go$'

      - id: ruff
        name: ruff
        entry: bash -c 'cd service && ruff check src/ tests/'
        language: system
        pass_filenames: false
        files: '\.py$'
