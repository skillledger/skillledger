# Production overlay for SkillLedger hosted service
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Set SKILLLEDGER_DOMAIN (default: log.skillledger.dev)
#   - Set SKILLLEDGER_ADMIN_API_KEY for bootstrap publisher creation
#   - Set POSTGRES_PASSWORD for database security
#   - Set AUTH_SECRET for dashboard session encryption (openssl rand -base64 32)
#   - DNS A record pointing SKILLLEDGER_DOMAIN to server IP
#   - DNS A record pointing DASHBOARD_DOMAIN to server IP (default: dashboard.skillledger.dev)

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - skillledger-service
      - skillledger-dashboard
    environment:
      - DOMAIN=${SKILLLEDGER_DOMAIN:-log.skillledger.dev}
      - DASHBOARD_DOMAIN=${DASHBOARD_DOMAIN:-dashboard.skillledger.dev}

  skillledger-service:
    ports:
      - "127.0.0.1:8000:8000"  # Only accessible via Caddy, not directly
    environment:
      - SKILLLEDGER_DEBUG=false
      - SKILLLEDGER_ADMIN_API_KEY=${SKILLLEDGER_ADMIN_API_KEY:?Set SKILLLEDGER_ADMIN_API_KEY}
      - 'SKILLLEDGER_CORS_ORIGINS=["https://${SKILLLEDGER_DOMAIN:-log.skillledger.dev}"]'

  skillledger-log:
    ports:
      - "127.0.0.1:2025:2025"  # Internal only

  skillledger-dashboard:
    ports:
      - "127.0.0.1:3000:3000"  # Only accessible via Caddy, not directly
    environment:
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET}
      - AUTH_URL=https://${DASHBOARD_DOMAIN:-dashboard.skillledger.dev}
      - NEXT_PUBLIC_API_URL=https://${SKILLLEDGER_DOMAIN:-log.skillledger.dev}
      - API_URL=http://skillledger-service:8000
      - AUTH_TRUST_HOST=true

  postgres:
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}

volumes:
  caddy-data:
  caddy-config:
