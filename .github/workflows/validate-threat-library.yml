name: Validate Threat Library

on:
  pull_request:
    paths:
      - 'threat-library/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jsonschema
      - run: python scripts/validate-threat-library.py
