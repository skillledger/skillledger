services:
  skillledger-log:
    build:
      context: ./log
      dockerfile: Dockerfile
    ports:
      - "2025:2025"
    environment:
      - LOG_PRIVATE_KEY=${LOG_PRIVATE_KEY}
      - STORAGE_DIR=/data/tlog
      - LISTEN_ADDR=:2025
    volumes:
      - log-data:/data/tlog
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2025/checkpoint"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  skillledger-service:
    build:
      context: ./service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SKILLLEDGER_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-skillledger}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-skillledger}
      - SKILLLEDGER_LOG_URL=http://skillledger-log:2025
      - SKILLLEDGER_ADMIN_API_KEY=${SKILLLEDGER_ADMIN_API_KEY:-dev-admin-key-do-not-use-in-prod}
      - SKILLLEDGER_JWT_SECRET=${SKILLLEDGER_JWT_SECRET:-dev-jwt-secret-do-not-use-in-prod}
      - SKILLLEDGER_DASHBOARD_URL=${SKILLLEDGER_DASHBOARD_URL:-http://localhost:3000}
      - SKILLLEDGER_DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      skillledger-log:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-skillledger}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-skillledger}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillledger"]
      interval: 5s
      timeout: 3s
      retries: 5

  skillledger-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-change-in-prod}
      - AUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://skillledger-service:8000
      - API_URL=http://skillledger-service:8000
    depends_on:
      skillledger-service:
        condition: service_started

volumes:
  log-data:
  pg-data:
